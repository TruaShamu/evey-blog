<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watercolor Landscape</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #f5f0e6; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
// STYLE 3: WATERCOLOR — soft wet-edge blobs, paper texture, bleeding colors
const CONFIG = { seed: 42 };

const PAL = {
  sky:    ['#a8c8e8', '#c8d8e8', '#e8dcc8', '#f0e0c0'],
  green:  ['#5a8a4a', '#7aaa5a', '#9ac06a', '#b8d48a', '#4a7a3a'],
  earth:  ['#8a7050', '#a08a60', '#b8a070'],
  warm:   ['#d8a070', '#e8c090', '#c88060'],
  flower: ['#d06080', '#e8a060', '#d0d060', '#80a0d0', '#e0e0e0'],
};

function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function getY(x, row, total) {
  let t = row / total;
  let baseY = lerp(height * 0.35, height * 0.9, t);
  let amp = height * 0.28 * (1 - t * 0.3);
  let ns = lerp(0.004, 0.01, t);
  let n = noise(x * ns + row * 5) + noise(x * ns * 2 + row * 9) * 0.35;
  return baseY - (n / 1.35) * amp;
}

// Watercolor blob — many transparent overlapping ellipses with jitter
function watercolorBlob(cx, cy, w, h, col, alpha, layers) {
  noStroke();
  for (let i = 0; i < layers; i++) {
    let jx = cx + randomGaussian(0, w * 0.08);
    let jy = cy + randomGaussian(0, h * 0.08);
    let jw = w * random(0.7, 1.3);
    let jh = h * random(0.7, 1.2);
    fill(col[0], col[1], col[2], alpha);
    ellipse(jx, jy, jw, jh);
  }
}

// Watercolor fill for terrain — overlapping transparent shapes
function watercolorTerrain(row, totalRows) {
  let t = row / totalRows;
  let colHex = random(PAL.green);
  let col = hexRgb(colHex);

  // Multiple wash passes
  for (let pass = 0; pass < 3; pass++) {
    let alpha = 15 + pass * 8;
    // Vary color slightly each pass
    let vc = [
      constrain(col[0] + random(-15, 15), 0, 255),
      constrain(col[1] + random(-15, 15), 0, 255),
      constrain(col[2] + random(-15, 15), 0, 255),
    ];

    noStroke();
    fill(vc[0], vc[1], vc[2], alpha);
    beginShape();
    for (let x = -20; x <= width + 20; x += 5) {
      let y = getY(x, row, totalRows) + randomGaussian(0, 2);
      vertex(x, y);
    }
    // Close below
    vertex(width + 20, height + 20);
    vertex(-20, height + 20);
    endShape(CLOSE);
  }

  // Wet edge — darker stroke along the terrain line
  let darkCol = hexRgb(PAL.green[PAL.green.length - 1]);
  stroke(darkCol[0], darkCol[1], darkCol[2], 25 + t * 20);
  strokeWeight(1 + t * 1.5);
  noFill();
  beginShape();
  for (let x = 0; x <= width; x += 3) {
    vertex(x, getY(x, row, totalRows) + randomGaussian(0, 0.8));
  }
  endShape();

  // Shadow blobs in valleys
  let shadowCol = hexRgb(PAL.green[0]);
  for (let x = 0; x < width; x += random(15, 40)) {
    let y = getY(x, row, totalRows);
    let dark = noise(x * 0.005 + row * 3);
    if (dark > 0.55) {
      watercolorBlob(x, y + random(5, 20), random(15, 40), random(8, 20),
        shadowCol, 8 + dark * 10, 4);
    }
  }
}

function watercolorTree(x, groundY, size) {
  // Trunk — brown wash
  let trunk = hexRgb(random(PAL.earth));
  watercolorBlob(x, groundY - size * 0.8, size * 0.25, size * 1.6, trunk, 20, 5);

  // Canopy — green wash blobs
  let topY = groundY - size * 1.8;
  for (let i = 0; i < 6; i++) {
    let col = hexRgb(random(PAL.green));
    let bx = x + randomGaussian(0, size * 0.3);
    let by = topY + randomGaussian(0, size * 0.25);
    watercolorBlob(bx, by, size * random(0.5, 1.2), size * random(0.4, 1), col, 12, 5);
  }
}

function watercolorFlower(x, groundY, size) {
  // Stem
  let stemCol = hexRgb(PAL.green[0]);
  stroke(stemCol[0], stemCol[1], stemCol[2], 50);
  strokeWeight(1);
  noFill();
  let stemH = random(size * 3, size * 6);
  bezier(x, groundY, x + random(-2, 2), groundY - stemH * 0.5,
         x + random(-3, 3), groundY - stemH * 0.8, x, groundY - stemH);

  // Bloom — single wash blob
  let col = hexRgb(random(PAL.flower));
  noStroke();
  watercolorBlob(x, groundY - stemH, size * 1.5, size * 1.2, col, 20, 6);
}

function draw() {
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);

  // Paper background with texture
  background('#f5f0e6');
  loadPixels();
  for (let i = 0; i < pixels.length; i += 4) {
    let grain = (Math.random() - 0.5) * 8;
    pixels[i]   = constrain(pixels[i] + grain, 0, 255);
    pixels[i+1] = constrain(pixels[i+1] + grain, 0, 255);
    pixels[i+2] = constrain(pixels[i+2] + grain, 0, 255);
  }
  updatePixels();

  // Sky wash
  let skyColors = PAL.sky.map(hexRgb);
  noStroke();
  for (let y = 0; y < height * 0.5; y += 3) {
    let t = y / (height * 0.5);
    let seg = t * (skyColors.length - 1);
    let idx = Math.min(Math.floor(seg), skyColors.length - 2);
    let frac = seg - idx;
    let c1 = skyColors[idx], c2 = skyColors[idx + 1];
    fill(lerp(c1[0], c2[0], frac), lerp(c1[1], c2[1], frac), lerp(c1[2], c2[2], frac), 30);
    rect(0, y + randomGaussian(0, 1), width, 5);
  }

  // Cloud washes
  for (let i = 0; i < 4; i++) {
    let cx = random(width), cy = random(height * 0.05, height * 0.25);
    watercolorBlob(cx, cy, random(60, 150), random(20, 50), [255, 255, 250], 15, 8);
  }

  // Terrain layers
  let totalRows = 8;
  for (let row = 0; row < totalRows; row++) {
    watercolorTerrain(row, totalRows);
    let t = row / totalRows;

    // Trees
    if (t > 0.3) {
      for (let x = 0; x < width; x += random(30, 80)) {
        if (random() > 0.15) continue;
        watercolorTree(x, getY(x, row, totalRows), 8 + t * 18);
      }
    }
    // Flowers
    if (t > 0.4) {
      for (let x = 0; x < width; x += random(10, 30)) {
        if (random() > 0.1) continue;
        watercolorFlower(x, getY(x, row, totalRows), 2 + t * 3);
      }
    }
  }

  // Final paper grain overlay
  loadPixels();
  for (let i = 0; i < pixels.length; i += 4) {
    let grain = (Math.random() - 0.5) * 6;
    pixels[i]   = constrain(pixels[i] + grain, 0, 255);
    pixels[i+1] = constrain(pixels[i+1] + grain, 0, 255);
    pixels[i+2] = constrain(pixels[i+2] + grain, 0, 255);
  }
  updatePixels();
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  noLoop();
}
function keyPressed() {
  if (key === 's') saveCanvas('watercolor-landscape', 'png');
  if (key === 'r') { CONFIG.seed = floor(random(99999)); redraw(); }
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); redraw(); }
</script>
</body>
</html>
