<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>html,body{margin:0;padding:0;overflow:hidden;background:#0a0a0f;}canvas{display:block;}</style>
<script>p5.disableFriendlyErrors=true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head><body><script>
const CELL_SIZE = 6;
let cols, rows;
let grid, ages;
let gen = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  cols = Math.floor(width / CELL_SIZE);
  rows = Math.floor(height / CELL_SIZE);
  initGrid();
  frameRate(12);
}

function initGrid() {
  grid = [];
  ages = [];
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    ages[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = Math.random() > 0.82 ? 1 : 0;
      ages[i][j] = grid[i][j] ? 1 : 0;
    }
  }
  gen = 0;
}

function draw() {
  background(0, 0, 4);
  noStroke();

  // Draw cells
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (grid[i][j] === 1) {
        let age = ages[i][j];
        // Newborn=cyan(180), young=green(120), mature=gold(45), old=red(0)
        let hue = map(Math.min(age, 60), 0, 60, 180, 0);
        let sat = map(age, 0, 80, 90, 60);
        let bri = map(age, 0, 100, 95, 45);
        let alpha = map(age, 0, 30, 100, 80);
        fill(hue, sat, bri, alpha);
        rect(i * CELL_SIZE, j * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
      } else if (ages[i][j] > 0) {
        // Ghost of dead cells — fading memory
        let ghost = ages[i][j];
        fill(270, 40, 20, Math.max(0, 30 - ghost * 2));
        rect(i * CELL_SIZE, j * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
      }
    }
  }

  // Update
  let next = [];
  let nextAges = [];
  for (let i = 0; i < cols; i++) {
    next[i] = [];
    nextAges[i] = [];
    for (let j = 0; j < rows; j++) {
      let neighbors = countNeighbors(i, j);
      if (grid[i][j] === 1) {
        if (neighbors < 2 || neighbors > 3) {
          next[i][j] = 0;
          nextAges[i][j] = ages[i][j]; // remember age at death
        } else {
          next[i][j] = 1;
          nextAges[i][j] = ages[i][j] + 1;
        }
      } else {
        if (neighbors === 3) {
          next[i][j] = 1;
          nextAges[i][j] = 1; // newborn
        } else {
          next[i][j] = 0;
          nextAges[i][j] = Math.max(0, ages[i][j] - 0.5);
        }
      }
    }
  }
  grid = next;
  ages = nextAges;
  gen++;

  // Info
  fill(0, 0, 100, 30);
  textFont('monospace');
  textSize(11);
  textAlign(LEFT);
  text(`gen ${gen}`, 12, height - 12);
}

function countNeighbors(x, y) {
  let sum = 0;
  for (let i = -1; i <= 1; i++) {
    for (let j = -1; j <= 1; j++) {
      if (i === 0 && j === 0) continue;
      let ci = (x + i + cols) % cols;
      let cj = (y + j + rows) % rows;
      sum += grid[ci][cj];
    }
  }
  return sum;
}

function mousePressed() {
  // Paint cells around click
  let cx = Math.floor(mouseX / CELL_SIZE);
  let cy = Math.floor(mouseY / CELL_SIZE);
  for (let i = -3; i <= 3; i++) {
    for (let j = -3; j <= 3; j++) {
      let ni = (cx + i + cols) % cols;
      let nj = (cy + j + rows) % rows;
      if (Math.random() > 0.4) {
        grid[ni][nj] = 1;
        ages[ni][nj] = 1;
      }
    }
  }
}

function keyPressed() {
  if (key === 'r' || key === 'R') initGrid();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = Math.floor(width / CELL_SIZE);
  rows = Math.floor(height / CELL_SIZE);
  initGrid();
}
</script></body></html>
